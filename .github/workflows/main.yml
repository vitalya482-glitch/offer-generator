name: Build Windows modular release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  LVK_UPDATER_VERSION: "0.3.0"
  LVK_UPDATER_REPOSITORY: "vitalya482-glitch/LVK-Updater"
  LVK_UPDATER_ASSET_NAME: "LVKUpdater-win-x64.zip"

jobs:
  build-windows-modular-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Check Python syntax
        run: |
          python -m compileall app.py updater.py brands core gui config tools

      - name: Prepare release variables
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            $title = "SAM Offer Generator $tag"
            $notes = "Automatic GitHub Release from tag $tag."
          } else {
            $date = Get-Date -Format "yyyy.MM.dd"
            $tag = "v$date.${{ github.run_number }}"
            $title = "SAM Offer Generator $tag"
            $notes = "Automatic GitHub Release from main branch. Commit: ${{ github.sha }}"
          }

          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_TITLE=$title" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_NOTES=$notes" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "Release tag: $tag"
          Write-Host "Release title: $title"

      - name: Write legacy updater version into config/update.json
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $updatePath = "config/update.json"

          if (!(Test-Path $updatePath)) {
            throw "config/update.json was not found: $updatePath"
          }

          $json = Get-Content $updatePath -Raw | ConvertFrom-Json
          $json | Add-Member -NotePropertyName "github_owner" -NotePropertyValue "${{ github.repository_owner }}" -Force
          $json | Add-Member -NotePropertyName "github_repo" -NotePropertyValue "${{ github.event.repository.name }}" -Force
          $json | Add-Member -NotePropertyName "current_version" -NotePropertyValue $env:RELEASE_TAG -Force
          $json | Add-Member -NotePropertyName "app_asset_name" -NotePropertyValue "SAM-Offer-Generator-App-No-Runtime.zip" -Force
          $json | Add-Member -NotePropertyName "runtime_asset_name" -NotePropertyValue "SAM-Offer-Generator-Runtime-Win64.zip" -Force
          $json | ConvertTo-Json -Depth 20 | Set-Content $updatePath -Encoding UTF8

          Write-Host "Updated config/update.json for this build:"
          Get-Content $updatePath

      - name: Build one-dir Windows app
        run: |
          pyinstaller sam_offer_generator.spec --clean --noconfirm

      - name: Add editable files to portable folder
        run: |
          python tools/prepare_portable_release.py --dist dist/SAM-Offer-Generator

      - name: Compute runtime content signature
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $runtimeSha = (python tools/runtime_signature.py "dist/SAM-Offer-Generator/_internal").Trim()
          if ($runtimeSha -notmatch '^[0-9a-f]{64}$') {
            throw "Bad runtime content signature: $runtimeSha"
          }

          "RUNTIME_CONTENT_SHA256=$runtimeSha" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Runtime content SHA256: $runtimeSha"

      - name: Write LVK app.update.json
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $appUpdate = [ordered]@{
            schemaVersion = 2
            appId = "offer-generator"
            name = "SAM Offer Generator"
            channel = "stable"
            mainExe = "SAM-Offer-Generator.exe"
            manifestUrl = "https://github.com/${{ github.repository }}/releases/latest/download/offer-generator.json"
            versions = [ordered]@{
              app = $env:RELEASE_TAG
              runtime = $env:RUNTIME_CONTENT_SHA256
              updater = $env:LVK_UPDATER_VERSION
            }
          }

          $appUpdate | ConvertTo-Json -Depth 10 | Set-Content "app.update.json" -Encoding UTF8
          Copy-Item "app.update.json" "dist/SAM-Offer-Generator/app.update.json" -Force

          Write-Host "Updated app.update.json:"
          Get-Content "dist/SAM-Offer-Generator/app.update.json"

      - name: Download LVKUpdater
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.LVK_UPDATER_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            throw "Repository secret LVK_UPDATER_TOKEN is missing. Create a fine-grained token with Contents: Read access to vitalya482-glitch/LVK-Updater and save it in offer-generator Actions secrets."
          }

          $zipPath = $env:LVK_UPDATER_ASSET_NAME
          $extractDir = "lvk_updater"
          $releaseTag = "v$env:LVK_UPDATER_VERSION"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          gh release download $releaseTag `
            --repo $env:LVK_UPDATER_REPOSITORY `
            --pattern $env:LVK_UPDATER_ASSET_NAME `
            --dir "." `
            --clobber

          if (!(Test-Path $zipPath)) {
            throw "Release asset was not downloaded: $env:LVK_UPDATER_REPOSITORY / $releaseTag / $env:LVK_UPDATER_ASSET_NAME"
          }

          if (Test-Path $extractDir) {
            Remove-Item $extractDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

          $updater = Get-ChildItem -Recurse $extractDir -Filter "LVKUpdater.exe" | Select-Object -First 1
          if (-not $updater) {
            throw "LVKUpdater.exe not found in downloaded archive"
          }

          Copy-Item $updater.FullName "dist/SAM-Offer-Generator/LVKUpdater.exe" -Force
          Copy-Item $zipPath "dist/$env:LVK_UPDATER_ASSET_NAME" -Force

          $updaterZip = Get-Item "dist/$env:LVK_UPDATER_ASSET_NAME"
          $updaterSha = (Get-FileHash -Algorithm SHA256 -LiteralPath $updaterZip.FullName).Hash.ToLowerInvariant()
          "LVK_UPDATER_SHA256=$updaterSha" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LVK_UPDATER_SIZE=$($updaterZip.Length)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "LVKUpdater copied to dist/SAM-Offer-Generator/LVKUpdater.exe"
          Write-Host "LVKUpdater release asset staged: $($updaterZip.FullName)"
          Write-Host "LVKUpdater SHA256: $updaterSha"

      - name: Write release metadata for updater
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $releaseInfoPath = "dist/SAM-Offer-Generator/release_info.json"
          if (!(Test-Path $releaseInfoPath)) {
            throw "release_info.json was not found: $releaseInfoPath"
          }

          $json = Get-Content $releaseInfoPath -Raw | ConvertFrom-Json
          $json | Add-Member -NotePropertyName "app_version" -NotePropertyValue $env:RELEASE_TAG -Force
          $json | Add-Member -NotePropertyName "version" -NotePropertyValue $env:RELEASE_TAG -Force
          $json | Add-Member -NotePropertyName "tag_name" -NotePropertyValue $env:RELEASE_TAG -Force
          $json | Add-Member -NotePropertyName "github_owner" -NotePropertyValue "${{ github.repository_owner }}" -Force
          $json | Add-Member -NotePropertyName "github_repo" -NotePropertyValue "${{ github.event.repository.name }}" -Force
          $json | Add-Member -NotePropertyName "github_repository" -NotePropertyValue "${{ github.repository }}" -Force
          $json | Add-Member -NotePropertyName "runtime_content_sha256" -NotePropertyValue $env:RUNTIME_CONTENT_SHA256 -Force
          $json | Add-Member -NotePropertyName "lvk_updater_version" -NotePropertyValue $env:LVK_UPDATER_VERSION -Force
          $json | ConvertTo-Json -Depth 10 | Set-Content $releaseInfoPath -Encoding UTF8

          Write-Host "Updated release_info.json:"
          Get-Content $releaseInfoPath

      - name: Build only two distribution modules
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $dist = "dist/SAM-Offer-Generator"
          $moduleRoot = "dist/distribution-modules"
          $runtimeStage = Join-Path $moduleRoot "runtime"
          $appStage = Join-Path $moduleRoot "app"
          $runtimeZip = Join-Path $moduleRoot "SAM-Offer-Generator-Runtime-Win64.zip"
          $appZip = Join-Path $moduleRoot "SAM-Offer-Generator-App-No-Runtime.zip"

          if (!(Test-Path (Join-Path $dist "_internal"))) {
            throw "Runtime folder was not found: $dist/_internal"
          }

          if (Test-Path $moduleRoot) {
            Remove-Item $moduleRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $runtimeStage -Force | Out-Null
          New-Item -ItemType Directory -Path $appStage -Force | Out-Null

          $runtimeTarget = Join-Path $runtimeStage "SAM-Offer-Generator"
          New-Item -ItemType Directory -Path $runtimeTarget -Force | Out-Null
          Copy-Item -Path (Join-Path $dist "_internal") -Destination (Join-Path $runtimeTarget "_internal") -Recurse -Force

          $appTarget = Join-Path $appStage "SAM-Offer-Generator"
          New-Item -ItemType Directory -Path $appTarget -Force | Out-Null
          Get-ChildItem -Path $dist | Where-Object { $_.Name -ne "_internal" } | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination (Join-Path $appTarget $_.Name) -Recurse -Force
          }

          Compress-Archive -Path $runtimeTarget -DestinationPath $runtimeZip -Force
          Compress-Archive -Path $appTarget -DestinationPath $appZip -Force

          Get-ChildItem $moduleRoot -Filter "*.zip" | Select-Object Name, Length

      - name: Verify release contains exactly two modules
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $files = Get-ChildItem "dist/distribution-modules" -Filter "*.zip" | Sort-Object Name
          $expected = @(
            "SAM-Offer-Generator-App-No-Runtime.zip",
            "SAM-Offer-Generator-Runtime-Win64.zip"
          )
          $actual = @($files | ForEach-Object { $_.Name })

          if ($actual.Count -ne 2) {
            throw "Expected exactly 2 release ZIPs, got $($actual.Count): $($actual -join ', ')"
          }

          foreach ($name in $expected) {
            if ($actual -notcontains $name) {
              throw "Missing release ZIP: $name"
            }
          }

          Write-Host "Release ZIPs are OK:"
          $files | Select-Object Name, Length

      - name: Build LVK manifest asset
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $moduleRoot = "dist/distribution-modules"
          $appZip = Join-Path $moduleRoot "SAM-Offer-Generator-App-No-Runtime.zip"
          $runtimeZip = Join-Path $moduleRoot "SAM-Offer-Generator-Runtime-Win64.zip"
          $updaterZip = "dist/$env:LVK_UPDATER_ASSET_NAME"
          $manifestPath = "dist/offer-generator.json"

          $appFile = Get-Item $appZip
          $runtimeFile = Get-Item $runtimeZip
          $updaterFile = Get-Item $updaterZip
          $appSha = (Get-FileHash -Algorithm SHA256 -LiteralPath $appZip).Hash.ToLowerInvariant()
          $runtimeSha = (Get-FileHash -Algorithm SHA256 -LiteralPath $runtimeZip).Hash.ToLowerInvariant()
          $updaterSha = (Get-FileHash -Algorithm SHA256 -LiteralPath $updaterZip).Hash.ToLowerInvariant()

          $manifest = [ordered]@{
            schemaVersion = 2
            appId = "offer-generator"
            name = "SAM Offer Generator"
            channel = "stable"
            mandatory = $false
            mainExe = "SAM-Offer-Generator.exe"
            versions = [ordered]@{
              app = $env:RELEASE_TAG
              runtime = $env:RUNTIME_CONTENT_SHA256
              updater = $env:LVK_UPDATER_VERSION
            }
            packages = [ordered]@{
              app = [ordered]@{
                file = "SAM-Offer-Generator-App-No-Runtime.zip"
                url = "https://github.com/${{ github.repository }}/releases/download/$env:RELEASE_TAG/SAM-Offer-Generator-App-No-Runtime.zip"
                sha256 = $appSha
                size = $appFile.Length
              }
              runtime = [ordered]@{
                file = "SAM-Offer-Generator-Runtime-Win64.zip"
                url = "https://github.com/${{ github.repository }}/releases/download/$env:RELEASE_TAG/SAM-Offer-Generator-Runtime-Win64.zip"
                sha256 = $runtimeSha
                size = $runtimeFile.Length
              }
              updater = [ordered]@{
                file = $env:LVK_UPDATER_ASSET_NAME
                url = "https://github.com/${{ github.repository }}/releases/download/$env:RELEASE_TAG/$env:LVK_UPDATER_ASSET_NAME"
                sha256 = $updaterSha
                size = $updaterFile.Length
              }
            }
            notes = @(
              "Раздельное обновление app/runtime через LVKUpdater.",
              "Runtime скачивается только если изменился runtime content signature."
            )
          }

          $manifest | ConvertTo-Json -Depth 20 | Set-Content $manifestPath -Encoding UTF8
          Write-Host "Generated LVK manifest:"
          Get-Content $manifestPath

      - name: Upload runtime module artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAM-Offer-Generator-Runtime-Win64
          path: dist/distribution-modules/SAM-Offer-Generator-Runtime-Win64.zip
          retention-days: 30

      - name: Upload app no-runtime module artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAM-Offer-Generator-App-No-Runtime
          path: dist/distribution-modules/SAM-Offer-Generator-App-No-Runtime.zip
          retention-days: 30

      - name: Upload LVK manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: offer-generator-lvk-manifest
          path: dist/offer-generator.json
          retention-days: 30

      - name: Upload LVKUpdater artifact
        uses: actions/upload-artifact@v4
        with:
          name: LVKUpdater-win-x64
          path: dist/LVKUpdater-win-x64.zip
          retention-days: 30

      - name: Publish or update GitHub Release automatically
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          $tag = $env:RELEASE_TAG
          $title = $env:RELEASE_TITLE
          $notesPath = "dist/RELEASE_NOTES.md"

          $notes = @"
          $env:RELEASE_NOTES

          Release assets:
          - SAM-Offer-Generator-Runtime-Win64.zip
          - SAM-Offer-Generator-App-No-Runtime.zip
          - offer-generator.json
          - LVKUpdater-win-x64.zip

          Updater metadata:
          RUNTIME_CONTENT_SHA256=$env:RUNTIME_CONTENT_SHA256
          LVK_UPDATER_VERSION=$env:LVK_UPDATER_VERSION
          "@
          $notes | Set-Content $notesPath -Encoding UTF8

          $files = @(
            "dist/distribution-modules/SAM-Offer-Generator-Runtime-Win64.zip",
            "dist/distribution-modules/SAM-Offer-Generator-App-No-Runtime.zip",
            "dist/offer-generator.json",
            "dist/LVKUpdater-win-x64.zip"
          )

          Write-Host "Publishing release $tag with LVK manifest"

          if (gh release view $tag --repo "${{ github.repository }}" *> $null) {
            Write-Host "Release already exists. Removing old assets and uploading clean assets."
            $existingAssetsJson = gh release view $tag --repo "${{ github.repository }}" --json assets
            $existingAssets = ($existingAssetsJson | ConvertFrom-Json).assets
            foreach ($asset in $existingAssets) {
              if (![string]::IsNullOrWhiteSpace($asset.name)) {
                gh release delete-asset $tag $asset.name --repo "${{ github.repository }}" --yes
              }
            }
            gh release edit $tag --repo "${{ github.repository }}" --title "$title" --notes-file $notesPath
            gh release upload $tag @files --repo "${{ github.repository }}" --clobber
          } else {
            gh release create $tag @files --repo "${{ github.repository }}" --target "${{ github.sha }}" --title "$title" --notes-file $notesPath
          }

      - name: Cleanup old GitHub Releases and tags
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          $repo = "${{ github.repository }}"
          $keep = 3
          $currentTag = $env:RELEASE_TAG

          Write-Host "Keeping last $keep releases in $repo. Current release: $currentTag"

          $releaseJson = gh release list --repo $repo --limit 100 --json tagName,createdAt,isDraft,isPrerelease
          $releases = $releaseJson | ConvertFrom-Json

          if ($null -eq $releases -or $releases.Count -le $keep) {
            Write-Host "Nothing to clean. Release count: $($releases.Count)"
            exit 0
          }

          $sorted = $releases | Sort-Object { [datetime]$_.createdAt } -Descending
          $toDelete = $sorted | Select-Object -Skip $keep

          foreach ($release in $toDelete) {
            $tagName = $release.tagName

            if ([string]::IsNullOrWhiteSpace($tagName)) {
              Write-Host "Skip release without tagName."
              continue
            }

            if ($tagName -eq $currentTag) {
              Write-Host "Skip current release: $tagName"
              continue
            }

            Write-Host "Deleting old release and tag: $tagName"
            gh release delete $tagName --repo $repo --yes --cleanup-tag
          }

          Write-Host "Release cleanup completed."
