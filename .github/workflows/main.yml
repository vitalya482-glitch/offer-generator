name: Build Windows portable release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-portable:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Check Python syntax
        run: |
          python -m compileall app.py updater.py brands core gui config tools

      - name: Build one-dir Windows app
        run: |
          pyinstaller sam_offer_generator.spec --clean --noconfirm

      - name: Add editable files and source module copies to portable folder
        run: |
          python tools/prepare_portable_release.py --dist dist/SAM-Offer-Generator

      - name: Build modular source ZIPs
        run: |
          python tools/package_modules.py --output dist/source-modules

      - name: Zip portable Windows folder
        shell: pwsh
        run: |
          if (Test-Path "dist/SAM-Offer-Generator-windows-portable.zip") {
            Remove-Item "dist/SAM-Offer-Generator-windows-portable.zip" -Force
          }
          Compress-Archive -Path "dist/SAM-Offer-Generator/*" -DestinationPath "dist/SAM-Offer-Generator-windows-portable.zip" -Force

      - name: Build distribution runtime and app modules
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dist = "dist/SAM-Offer-Generator"
          $moduleRoot = "dist/distribution-modules"
          $runtimeStage = Join-Path $moduleRoot "runtime"
          $appStage = Join-Path $moduleRoot "app"
          $runtimeZip = Join-Path $moduleRoot "SAM-Offer-Generator-Runtime-Win64.zip"
          $appZip = Join-Path $moduleRoot "SAM-Offer-Generator-App-No-Runtime.zip"

          if (!(Test-Path (Join-Path $dist "_internal"))) {
            throw "Runtime folder was not found: $dist/_internal"
          }

          if (Test-Path $moduleRoot) {
            Remove-Item $moduleRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $runtimeStage -Force | Out-Null
          New-Item -ItemType Directory -Path $appStage -Force | Out-Null

          $runtimeTarget = Join-Path $runtimeStage "SAM-Offer-Generator"
          New-Item -ItemType Directory -Path $runtimeTarget -Force | Out-Null
          Copy-Item -Path (Join-Path $dist "_internal") -Destination (Join-Path $runtimeTarget "_internal") -Recurse -Force

          $appTarget = Join-Path $appStage "SAM-Offer-Generator"
          New-Item -ItemType Directory -Path $appTarget -Force | Out-Null
          Get-ChildItem -Path $dist | Where-Object { $_.Name -ne "_internal" } | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination (Join-Path $appTarget $_.Name) -Recurse -Force
          }

          Compress-Archive -Path $runtimeTarget -DestinationPath $runtimeZip -Force
          Compress-Archive -Path $appTarget -DestinationPath $appZip -Force

          Get-ChildItem $moduleRoot -Filter "*.zip" | Select-Object FullName, Length

      - name: Show release files
        shell: pwsh
        run: |
          Get-ChildItem -Recurse dist | Select-Object FullName, Length

      - name: Upload portable folder artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAM-Offer-Generator-windows-portable-folder
          path: dist/SAM-Offer-Generator/
          retention-days: 30

      - name: Upload portable ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAM-Offer-Generator-windows-portable-zip
          path: dist/SAM-Offer-Generator-windows-portable.zip
          retention-days: 30

      - name: Upload runtime Win64 module artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAM-Offer-Generator-runtime-win64-module
          path: dist/distribution-modules/SAM-Offer-Generator-Runtime-Win64.zip
          retention-days: 30

      - name: Upload app without runtime module artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAM-Offer-Generator-app-no-runtime-module
          path: dist/distribution-modules/SAM-Offer-Generator-App-No-Runtime.zip
          retention-days: 30

      - name: Upload module index artifact
        uses: actions/upload-artifact@v4
        with:
          name: offer-generator-modules-index
          path: |
            dist/source-modules/MODULES_INDEX.md
            dist/source-modules/SHA256SUMS.txt
          retention-days: 30

      - name: Upload entrypoint module artifact
        uses: actions/upload-artifact@v4
        with:
          name: offer-generator-entrypoint-module
          path: dist/source-modules/offer-generator-entrypoint.zip
          retention-days: 30

      - name: Upload core module artifact
        uses: actions/upload-artifact@v4
        with:
          name: offer-generator-core-module
          path: dist/source-modules/offer-generator-core.zip
          retention-days: 30

      - name: Upload brands module artifact
        uses: actions/upload-artifact@v4
        with:
          name: offer-generator-brands-module
          path: dist/source-modules/offer-generator-brands.zip
          retention-days: 30

      - name: Upload gui module artifact
        uses: actions/upload-artifact@v4
        with:
          name: offer-generator-gui-module
          path: dist/source-modules/offer-generator-gui.zip
          retention-days: 30

      - name: Upload config module artifact
        uses: actions/upload-artifact@v4
        with:
          name: offer-generator-config-module
          path: dist/source-modules/offer-generator-config.zip
          retention-days: 30

      - name: Upload MCP assistant module artifact
        uses: actions/upload-artifact@v4
        with:
          name: offer-generator-mcp-sam-assistant-module
          path: dist/source-modules/offer-generator-mcp-sam-assistant.zip
          retention-days: 30

      - name: Upload prices module artifact
        uses: actions/upload-artifact@v4
        with:
          name: offer-generator-prices-module
          path: dist/source-modules/offer-generator-prices.zip
          retention-days: 30

      - name: Upload GitHub build module artifact
        uses: actions/upload-artifact@v4
        with:
          name: offer-generator-github-build-module
          path: dist/source-modules/offer-generator-github-build.zip
          retention-days: 30

      - name: Upload all source modules artifact
        uses: actions/upload-artifact@v4
        with:
          name: offer-generator-source-modules-all
          path: dist/source-modules/offer-generator-source-modules.zip
          retention-days: 30

      - name: Publish GitHub Release for version tags
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SAM-Offer-Generator-windows-portable.zip
            dist/distribution-modules/SAM-Offer-Generator-Runtime-Win64.zip
            dist/distribution-modules/SAM-Offer-Generator-App-No-Runtime.zip
            dist/source-modules/*.zip
            dist/source-modules/MODULES_INDEX.md
            dist/source-modules/SHA256SUMS.txt
