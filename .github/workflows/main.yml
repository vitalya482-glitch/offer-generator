name: Build Windows EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name SAM-Offer-Generator --add-data "config.example.json;." --hidden-import brands.stulz --hidden-import brands.riello --hidden-import brands.dc_eltek --hidden-import brands.generator --hidden-import brands.registry --hidden-import core.docx_renderer --hidden-import core.excel_reader --hidden-import core.project_scanner app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: offer-generator-exe
          path: dist/*.exe